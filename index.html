<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unreserved Commuter Telemetry Console</title>
    <script src="https://tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { railBlue: '#0F2942', railOrange: '#FB8C00' } } } }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="bg-railBlue text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold">Unreserved Commuter Hub</h1>
                <p class="text-xs text-gray-300">Academic Evaluation Build • Malabar Sector Engine</p>
            </div>
            <span class="text-xs bg-black/30 px-3 py-1.5 rounded text-green-400 font-mono font-bold">● System Core Connected</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 space-y-6">
        <!-- SCOPE ALERT -->
        <div class="bg-amber-50 border-l-4 border-railOrange p-4 rounded shadow-sm">
            <p class="text-xs text-amber-700"><strong>Academic Notice:</strong> Station routing is structurally locked to <strong>MAJN ➔ CLT</strong> to showcase specialized unreserved fleets absent on IRCTC engines.</p>
        </div>

        <!-- CONSOLE ROUTER ENGINE -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
            <form id="searchForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">From Station</label>
                    <input type="text" id="fromStation" value="MAJN" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm font-semibold uppercase">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">To Station</label>
                    <input type="text" id="toStation" value="CLT" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm font-semibold uppercase">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Ticket Category Filter</label>
                    <select id="tierFilter" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm font-medium">
                        <option value="ALL">Show All Unreserved Rakes</option>
                        <option value="AMRIT BHARAT (GS)">AMRIT BHARAT (GS)</option>
                        <option value="ANTYODAYA EXPRESS">ANTYODAYA EXPRESS</option>
                        <option value="DE-RESERVED SLEEPER">DE-RESERVED SLEEPER</option>
                        <option value="EXPRESS TIER">EXPRESS TIER</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button type="submit" class="w-full bg-railBlue hover:bg-slate-800 text-white font-semibold rounded-lg py-2 text-sm transition shadow-md">Fetch Live Rakes</button>
                </div>
            </form>
        </section>

        <!-- TRACKER TARGET BOARD -->
        <section class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-md font-bold text-gray-800" id="resultHeading">Available Unreserved Services</h3>
                <span class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded-full font-mono" id="trainCount">0 Trains</span>
            </div>
            <div id="errorZone" class="hidden bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl text-xs"></div>
            <div id="trainListingZone" class="space-y-4"></div>
        </section>
    </main>

    <script>
        const searchForm = document.getElementById('searchForm');
        
        async function runTelemetryQuery() {
            const errorZone = document.getElementById('errorZone');
            const targetZone = document.getElementById('trainListingZone');
            errorZone.classList.add('hidden');
            targetZone.innerHTML = '';

            const payload = {
                from_station: document.getElementById('fromStation').value,
                to_station: document.getElementById('toStation').value,
                tier_filter: document.getElementById('tierFilter').value
            };

            try {
                // Endpoint target tracking backend service layer
                const response = await fetch('http://127.0.0', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    errorZone.innerHTML = `<strong>Backend Rejection:</strong> ${data.detail || 'Data validation failure.'}`;
                    errorZone.classList.remove('hidden');
                    return;
                }

                document.getElementById('trainCount').textContent = `${data.results.length} Train(s) Found`;
                
                data.results.forEach(train => {
                    targetZone.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <div class="bg-slate-50 px-4 py-2.5 border-b flex justify-between items-center">
                                <span class="text-sm font-bold text-slate-800">${train.trainNumber} — ${train.name}</span>
                                <span class="text-xs font-bold px-2 py-0.5 rounded bg-railBlue text-white">${train.tier}</span>
                            </div>
                            <div class="p-4 grid grid-cols-1 md:grid-cols-3 items-center gap-4">
                                <div class="text-sm font-medium text-gray-700">🕒 ${train.departure} ➔ ${train.arrival} (${train.duration})</div>
                                <div><span class="text-xs px-2 py-1 rounded-full border ${train.densityColor}">● ${train.liveDensity}</span></div>
                                <div class="md:text-right text-lg font-black text-gray-900">₹${train.baseFare}</div>
                            </div>
                            <div class="bg-blue-50 px-4 py-2 text-xs text-blue-900 font-medium">🎓 Panel Note: ${train.justificationText}</div>
                        </div>
                    `;
                });
            } catch (err) {
                errorZone.innerHTML = `<strong>Network Exception:</strong> Failed to fetch live stream. Verify your FastAPI local runtime is listening on port 8000.`;
                errorZone.classList.remove('hidden');
            }
        }

        searchForm.addEventListener('submit', (e) => { e.preventDefault(); runTelemetryQuery(); });
        window.addEventListener('DOMContentLoaded', runTelemetryQuery);
    </script>
</body>
</html>
