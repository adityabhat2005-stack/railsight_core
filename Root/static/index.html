<!-- TARGET LOCATION: /static/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailSight Dashboard | True Live NTES Tracker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --dark-bg: #0b0f19;
            --surface-card: #161f30;
            --sky-accent: #38bdf8;
            --text-white: #f8fafc;
            --text-slate: #94a3b8;
            --clr-green: #10b981;
            --clr-amber: #f59e0b;
            --clr-orange: #ea580c;
            --clr-red: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-white); padding: 15px; }
        .navbar-wrapper { background-color: var(--surface-card); padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; border-bottom: 4px solid var(--sky-accent); }
        .branding h1 { font-size: 1.6rem; letter-spacing: 1px; }
        .branding h1 span { color: var(--sky-accent); }
        .branding p { font-size: 0.8rem; color: var(--text-slate); margin-top: 2px; }
        .time-control-deck span { background: #0b0f19; padding: 8px 12px; border-radius: 4px; font-weight: bold; border: 1px solid var(--text-slate); color: var(--sky-accent); font-family: monospace; }
        .telemetry-bar { background: rgba(56, 189, 248, 0.1); padding: 10px 15px; border-radius: 6px; margin-bottom: 20px; display: flex; justify-content: space-between; font-size: 0.85rem; border-left: 4px solid var(--sky-accent); }
        .timeline-cards-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; }
        .card { background: var(--surface-card); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.4); margin-bottom: 10px; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .card-top h3 { font-size: 1.2rem; color: #fff; font-weight: bold; }
        .train-id-badge { background: #0b0f19; padding: 2px 6px; font-size: 0.75rem; border-radius: 4px; color: var(--sky-accent); font-weight: bold; }
        .specialty-tag { background: var(--clr-green); color: #000; font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 10px; margin-top: 4px; display: inline-block; }
        .metrics-row { display: flex; justify-content: space-between; background: #0b0f19; padding: 8px; border-radius: 6px; margin: 10px 0; }
        .metric-cell span { display: block; font-size: 0.7rem; color: var(--text-slate); }
        .metric-cell strong { font-size: 0.95rem; }
        .fare-text { font-size: 0.95rem; margin-bottom: 10px; }
        .fare-text span { font-weight: bold; color: var(--sky-accent); }
        .crowd-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; background: #0b0f19; padding: 8px; border-radius: 4px; margin-bottom: 12px; border-left: 3px solid var(--sky-accent); }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dot-green { background: var(--clr-green); }
        .dot-amber { background: var(--clr-amber); }
        .dot-red { background: var(--clr-red); }
        .live-tracker-panel { background: #0b0f19; padding: 12px; border-radius: 6px; margin-bottom: 14px; border: 1px solid #1e293b; }
        .tracker-header { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-slate); }
        .advisory { padding: 10px; border-radius: 4px; font-size: 0.78rem; font-weight: bold; line-height: 1.3; }
        .alert-GREEN { background: rgba(16,185,129,0.15); border: 1px solid var(--clr-green); color: #34d399; }
        .alert-ORANGE { background: rgba(234, 88, 12, 0.15); border: 1px solid var(--clr-orange); color: #fb923c; }
    </style>
</head>
<body>
    <header class="navbar-wrapper">
        <div class="branding">
            <h1>RAIL<span>SIGHT</span></h1>
            <p>Independent Operational Intelligence & Live Status Corridor Tracker</p>
        </div>
        <div class="time-control-deck">
            <span id="live-clock-badge">Syncing Clock Data...</span>
        </div>
    </header>

    <main class="content-viewport">
        <div class="telemetry-bar">
            <span>Corridor Path: Mangaluru Central (MAJN) → Kozhikode Main (CLT)</span>
            <span style="color:var(--sky-accent); font-weight:bold;">🛰️ TRUE LIVE NTES RADAR FEED SYNCED</span>
        </div>

        <!-- Dynamic Container where app.js continuously streams and mounts live data cards -->
        <div class="timeline-cards-container" id="cards-mount-point">
            <p style="text-align:center; grid-column:1/-1; color:var(--text-slate);">Initializing live database query pipeline...</p>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
